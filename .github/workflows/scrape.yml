name: Scraper Diario Alquileres

on:
  schedule:
    # Ejecutar todos los días a las 14:00 UTC (11:00 AM UTC-3 Uruguay)
    - cron: '0 14 * * *'
    # Ejecutar todos los días a las 21:00 UTC (18:00 / 6:00 PM UTC-3 Uruguay)
    - cron: '0 21 * * *'
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Ejecutar Scraper Principal
        run: |
          # El scraper generará alquileres.json y alquileres.xlsx
          python main.py
          
      - name: Commit y Push de los cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add alquileres.xlsx alquileres.json frontend/public/alquileres.json
          
          # Si no hay cambios, commit falla. Se usa || exit 0 para no romper el action
          git commit -m "chore: actualizacion automatica de alquileres [skip ci]" || exit 0
          
          git push
